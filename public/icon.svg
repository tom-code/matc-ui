<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2a3a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Cardinal spokes -->
  <line x1="256" y1="192" x2="256" y2="110" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" opacity="0.75"/>
  <line x1="256" y1="320" x2="256" y2="402" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" opacity="0.75"/>
  <line x1="192" y1="256" x2="110" y2="256" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" opacity="0.75"/>
  <line x1="320" y1="256" x2="402" y2="256" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" opacity="0.75"/>

  <!-- Diagonal spokes -->
  <line x1="211" y1="211" x2="158" y2="158" stroke="#3b82f6" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <line x1="301" y1="211" x2="354" y2="158" stroke="#3b82f6" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <line x1="211" y1="301" x2="158" y2="354" stroke="#3b82f6" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <line x1="301" y1="301" x2="354" y2="354" stroke="#3b82f6" stroke-width="10" stroke-linecap="round" opacity="0.4"/>

  <!-- Cardinal peripheral nodes -->
  <circle cx="256" cy="88"  r="34" fill="url(#node)"/>
  <circle cx="256" cy="424" r="34" fill="url(#node)"/>
  <circle cx="88"  cy="256" r="34" fill="url(#node)"/>
  <circle cx="424" cy="256" r="34" fill="url(#node)"/>

  <!-- Diagonal peripheral nodes -->
  <circle cx="148" cy="148" r="22" fill="#3b82f6" opacity="0.5"/>
  <circle cx="364" cy="148" r="22" fill="#3b82f6" opacity="0.5"/>
  <circle cx="148" cy="364" r="22" fill="#3b82f6" opacity="0.5"/>
  <circle cx="364" cy="364" r="22" fill="#3b82f6" opacity="0.5"/>

  <!-- Central hub -->
  <circle cx="256" cy="256" r="68" fill="url(#node)"/>
  <circle cx="256" cy="256" r="48" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.25"/>
  <circle cx="256" cy="256" r="18" fill="#ffffff" opacity="0.85"/>
</svg>
