name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # vue-tsc type-check + vite build (mirrors `npm run build`)
      - run: npm run build

  rust:
    name: Rust check
    runs-on: macos-latest
    steps:
      # Checkout this repo at the default workspace path, e.g.:
      #   /home/runner/work/matc-ui/matc-ui/
      - uses: actions/checkout@v4

      # Checkout rust-matc as a sibling so the relative path dep resolves:
      #   src-tauri/Cargo.toml: path = "../../rust-matc"
      # That resolves to ../rust-matc relative to the repo root.
      # NOTE: if rust-matc is private or in a different account, replace
      # the repository value and add a `token: ${{ secrets.PAT }}` line.
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rust-matc
          path: ../rust-matc

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: check
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
